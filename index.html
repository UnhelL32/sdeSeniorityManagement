            (item.id && item.id.includes(searchTerm)) ||
            (item.serial && item.serial.toString().includes(searchTerm)) ||
            (item.designation && item.designation.includes(searchTerm)) ||
            (item.prl && item.prl.includes(searchTerm));
          
          const matchDesignation = designationFilter === 'All' || item.designation === designationFilter;
          
          return matchSearch && matchDesignation;
        });
      }, [data, searchTerm, designationFilter]);

      // Sorting logic
      const sortedData = useMemo(() => {
        const sorted = [...filteredData];
        sorted.sort((a, b) => {
          let valA = a[sortBy];
          let valB = b[sortBy];

          if (sortBy === 'serial') {
            return sortOrder === 'asc' ? valA - valB : valB - valA;
          }

          // Dates parsing (Bangla numerals or standard fallback formats)
          if (sortBy === 'dob' || sortBy === 'prl') {
            // Extracts year for simpler comparison
            const getYear = (str) => {
              if (!str) return 0;
              const matches = str.match(/\d{4}/);
              return matches ? parseInt(matches[0], 10) : 0;
            };
            valA = getYear(valA);
            valB = getYear(valB);
          }

          if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
          if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
          return 0;
        });
        return sorted;

        const startIndex = (currentPage - 1) * itemsPerPage;

      const totalPages = Math.ceil(sortedData.length / itemsPerPage);

                          placeholder="জনাব..."
                          value={formName}
                          onChange={(e) => setFormName(e.target.value)}
                          className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">পদবী (Designation)</label>
                        <select 
                          value={formDesignation}
                          onChange={(e) => setFormDesignation(e.target.value)}
                          className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                        >
                          <option value="উপ-বিভাগীয় প্রকৌশলী">উপ-বিভাগীয় প্রকৌশলী</option>
                          <option value="নির্বাহী প্রকৌশলী (ভারপ্রাপ্ত)">নির্বাহী প্রকৌশলী (ভারপ্রাপ্ত)</option>
                          <option value="নির্বাহী প্রকৌশলী (ভারঃ)">নির্বাহী প্রকৌশলী (ভারঃ)</option>
                          <option value="উপ-পরিচালক (ভারপ্রাপ্ত)">উপ-পরিচালক (ভারপ্রাপ্ত)</option>
                          <option value="সহকারী প্রধান প্রকৌশলী (ভারপ্রাপ্ত)">সহকারী প্রধান প্রকৌশলী (ভারপ্রাপ্ত)</option>
                        </select>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">জন্ম তারিখ</label>
                          <input 
                            type="text" 
                            placeholder="e.g. ১৫-০৮-১৯৯৫"
                            value={formDob}
                            onChange={(e) => setFormDob(e.target.value)}
                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">PRL গমনের তারিখ</label>
                          <input 
                            type="text" 
                            placeholder="e.g. ১৫-০৮-২০৫৪"
                            value={formPrl}
                            onChange={(e) => setFormPrl(e.target.value)}
                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                          />
                        </div>
                      </div>

                      <div className="pt-4 flex items-center justify-end gap-3">
                        <button 
                          type="button"
                          onClick={() => setIsAddOpen(false)}
                          className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 font-semibold rounded-xl text-sm"
                        >
                          বাতিল করুন
                        </button>
                        <button 
                          type="submit"
                          className="px-5 py-2 bg-brand-600 hover:bg-brand-500 text-white font-semibold rounded-xl text-sm shadow-lg shadow-brand-600/20"
                        >
                          তালিকাভুক্ত করুন
                        </button>
                      </div>

                    </form>
                  </div>
                </div>
              )}

              {/* 2. Edit Entry Modal Overlay */}
              {isEditOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                  <div className="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl relative animate-in fade-in zoom-in-95 duration-200">
                    <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-800">
                      <h3 className="text-lg font-bold text-white flex items-center gap-2">
                        <i data-lucide="edit-3" className="text-brand-400 w-5 h-5"></i>
                        কর্মকর্তার তথ্য সংশোধন
                      </h3>
                      <button 
                        onClick={() => setIsEditOpen(false)}
                        className="p-1.5 text-slate-400 hover:text-white rounded-lg hover:bg-slate-800"
                      >
                        <i data-lucide="x" className="w-5 h-5"></i>
                      </button>
                    </div>

                    <form onSubmit={handleEditSubmit} className="space-y-4">
                      
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">জه‌یষ্ঠতা ক্রম (Serial)*</label>
                          <input 
                            type="number" 
                            required
                            value={formSerial}
                            onChange={(e) => setFormSerial(e.target.value)}
                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">পরিচিতি নং (ID)*</label>
                          <input 
                            type="text" 
                            required
                            value={formId}
                            onChange={(e) => setFormId(e.target.value)}
                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">কর্মকর্তার নাম (বাংলায়)*</label>
                        <input 
                          type="text" 
                          required
                          value={formName}
                          onChange={(e) => setFormName(e.target.value)}
                          className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">পদবী (Designation)</label>
                        <select 
                          value={formDesignation}
                          onChange={(e) => setFormDesignation(e.target.value)}
                          className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                        >
                          <option value="উপ-বিভাগীয় প্রকৌশলী">উপ-বিভাগীয় প্রকৌশলী</option>
                          <option value="নির্বাহী প্রকৌশলী (ভারপ্রাপ্ত)">নির্বাহী প্রকৌশলী (ভারপ্রাপ্ত)</option>
                          <option value="নির্বাহী প্রকৌশলী (ভারঃ)">নির্বাহী প্রকৌশলী (ভারঃ)</option>
                          <option value="উপ-পরিচালক (ভারপ্রাপ্ত)">উপ-পরিচালক (ভারপ্রাপ্ত)</option>
                          <option value="সহকারী প্রধান প্রকৌশলী (ভারপ্রাপ্ত)">সহকারী প্রধান প্রকৌশলী (ভারপ্রাপ্ত)</option>
                          <option value="আবাসিক প্রকৌশলী (উপ-বিভাগীয় প্রকৌশলী)">আবাসিক প্রকৌশলী (উপ-বিভাগীয় প্রকৌশলী)</option>
                        </select>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">জন্ম তারিখ</label>
                          <input 
                            type="text" 
                            value={formDob}
                            onChange={(e) => setFormDob(e.target.value)}
                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-semibold uppercase text-slate-400 mb-1">PRL গমনের তারিখ</label>
                          <input 
                            type="text" 
                            value={formPrl}
                            onChange={(e) => setFormPrl(e.target.value)}
                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                          />
                        </div>
                      </div>

                      <div className="pt-4 flex items-center justify-end gap-3">
                        <button 
                          type="button"
                          onClick={() => setIsEditOpen(false)}
                          className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 font-semibold rounded-xl text-sm"
                        >
                          বাতিল করুন
                        </button>
                        <button 
                          type="submit"
                          className="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl text-sm shadow-lg shadow-emerald-600/20"
                        >
                          সংরক্ষণ করুন
                        </button>
                      </div>

                    </form>
                  </div>
                </div>
              )}

              {/* 3. Delete Confirmation Overlay (Safe alternative to standard alerts) */}
              {isDeleteConfirmOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                  <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl relative animate-in fade-in zoom-in-95 duration-200">
                    <div className="text-center">
                      <div className="inline-flex p-3 bg-rose-500/10 rounded-full text-rose-500 mb-4">
                        <i data-lucide="alert-triangle" className="w-8 h-8"></i>
                      </div>
                      <h3 className="text-lg font-bold text-white">আপনি কি নিশ্চিতভাবে মুছে ফেলতে চান?</h3>
                      <p className="text-sm text-slate-400 mt-2">
                        আপনি কর্মকর্তা <strong className="text-rose-400">{selectedSde?.name}</strong> (আইডি: {selectedSde?.id}) এর তথ্য সম্পূর্ণরূপে মুছে ফেলতে চলেছেন। এই কাজটি আর ফিরিয়ে আনা সম্ভব নয়।
                      </p>
                    </div>

                    <div className="mt-6 flex items-center justify-center gap-3">
                      <button 
                        onClick={() => setIsDeleteConfirmOpen(false)}
                        className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 font-semibold rounded-xl text-sm"
                      >
                        বাতিল
                      </button>
                      <button 
                        onClick={handleDelete}
                        className="px-5 py-2 bg-rose-600 hover:bg-rose-500 text-white font-semibold rounded-xl text-sm shadow-lg shadow-rose-600/20"
                      >
                        মুছে ফেলুন (Confirm Delete)
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          )}
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
