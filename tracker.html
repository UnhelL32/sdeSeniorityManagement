    const populateDatabase = () => {

              <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between">
                <div>
                  <span className="text-xs text-slate-400 block font-medium">{language === "bn" ? "অবসর ৫ বছরের মধ্যে" : "PRL (Next 5 Years)"}</span>
                  <span className="text-2xl font-black text-amber-400 mt-1 block">{language === "bn" ? translateNumberToBn(stats.retiringSoon) : stats.retiringSoon}</span>
                </div>
              </div>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 sm:p-5 space-y-4 shadow-xl">
              <div className="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div className="relative w-full md:w-96">
                  <input type="text" placeholder={language === "bn" ? "নাম, পরিচিতি নং বা ক্রমিক দিয়ে খুঁজুন..." : "Search SDE by Name, ID, or Serial..."} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-4 pr-4 py-2.5 rounded-xl bg-slate-950 text-slate-100 placeholder-slate-500 border border-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" />
                </div>
                <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                  <div className="flex-1 sm:flex-initial">
                    <select value={selectedDesignation} onChange={(e) => setSelectedDesignation(e.target.value)} className="w-full sm:w-48 bg-slate-950 border border-slate-800 text-slate-200 px-3 py-2 rounded-xl text-xs focus:ring-emerald-500">
                      <option value="All">{language === "bn" ? "সকল পদবী" : "All Designations"}</option>
                      <option value="Sub Divisional Engineer">{language === "bn" ? "উপ-বিভাগীয় প্রকৌশলী" : "Sub Divisional Engineer"}</option>
                      <option value="Executive Engineer (Acting)">{language === "bn" ? "নির্বাহী প্রকৌশলী (ভারপ্রাপ্ত)" : "Executive Engineer (Acting)"}</option>
                    </select>
                  </div>
                  <div className="flex-1 sm:flex-initial">
                    <select value={selectedRetirementTimeline} onChange={(e) => setSelectedRetirementTimeline(e.target.value)} className="w-full sm:w-48 bg-slate-950 border border-slate-800 text-slate-200 px-3 py-2 rounded-xl text-xs focus:ring-emerald-500">
                      <option value="All">{language === "bn" ? "সকল অবসর সময়কাল" : "All Retirement Timeline"}</option>
                      <option value="5">{language === "bn" ? "আগামী ৫ বছর" : "Within 5 Years"}</option>
                      <option value="10">{language === "bn" ? "আগামী ১০ বছর" : "Within 10 Years"}</option>
                      <option value="retired">{language === "bn" ? "ইতিমধ্যে অবসরপ্রাপ্ত" : "Already Retired"}</option>
                    </select>
                  </div>
                  <div className="flex items-end gap-2">
                    <button onClick={handleExportCSV} className="p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl transition text-xs font-bold border border-slate-700">📥 Export</button>
                    <button onClick={handleResetDatabase} className="p-2 bg-red-950/20 hover:bg-red-950/40 text-red-400 rounded-xl transition text-xs font-bold border border-red-500/20">🔄 Reset</button>
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
              <div className="overflow-x-auto">
                <table className="min-w-full divide-y divide-slate-800 text-left text-sm">
                  <thead className="bg-slate-950 text-slate-300">
                    <tr>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase">{language === "bn" ? "ক্রমিক" : "Serial"}</th>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase">{language === "bn" ? "নাম ও পরিচিতি নং" : "Name & ID"}</th>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase">{language === "bn" ? "পদবী" : "Designation"}</th>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase">{language === "bn" ? "জন্ম তারিখ" : "Date of Birth"}</th>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase">{language === "bn" ? "PRL গমনের তারিখ" : "PRL Date"}</th>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase">{language === "bn" ? "অবশিষ্ট কর্মজীবন" : "Service Left"}</th>
                      <th className="py-3.5 px-4 text-xs font-bold uppercase text-right">{language === "bn" ? "পদক্ষেপ" : "Actions"}</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-800/60">
                    {paginatedSdes.length > 0 ? (
                      paginatedSdes.map((sde) => {
                        const isMinhaj = sde.isCreator || sde.serial === 275;
                        return (
                          <tr key={sde.serial} className={`hover:bg-slate-800/40 transition group ${isMinhaj ? 'bg-teal-950/20 border-l-4 border-l-teal-500' : ''}`}>
                            <td className="py-4 px-4 font-semibold text-slate-300">{language === "bn" ? translateNumberToBn(sde.serial) : `#${sde.serial}`}</td>
                            <td className="py-4 px-4">
                              <div className="font-bold text-white group-hover:text-emerald-400 transition flex items-center gap-1.5">
                                {language === "bn" ? sde.nameBn : sde.nameEn}
                                {isMinhaj && <span className="text-[9px] bg-teal-400/10 text-teal-400 px-1.5 py-0.5 rounded border border-teal-500/35">Creator Profile</span>}
                              </div>
                              <div className="text-xs text-slate-400 mt-0.5"><span className="bg-slate-850 px-2 py-0.5 rounded text-[10px] font-mono">ID: {sde.id}</span></div>
                            </td>
                            <td className="py-4 px-4">
                              <span className={`px-2 py-1 rounded-full text-xs font-semibold ${sde.designationEn.includes("Executive") ? "bg-violet-500/10 text-violet-400" : "bg-emerald-500/10 text-emerald-400"}`}>
                                {language === "bn" ? sde.designationBn : sde.designationEn}
                              </span>
                            </td>
                            <td className="py-4 px-4 font-mono text-xs">{language === "bn" ? translateNumberToBn(sde.dob) : sde.dob}</td>
                            <td className="py-4 px-4 font-mono text-xs font-bold text-slate-300">{language === "bn" ? translateNumberToBn(sde.prl) : sde.prl}</td>
                            <td className="py-4 px-4"><span className="text-xs bg-slate-800 px-2.5 py-1 rounded-lg font-medium">{getRemainingService(sde.prl)}</span></td>
                            <td className="py-4 px-4 text-right">
                              <div className="flex items-center justify-end gap-2 opacity-90 group-hover:opacity-100">
                                <button onClick={() => setSelectedSde(sde)} className="hover:text-white">👁️</button>
                                <button onClick={() => handleOpenEdit(sde)} className="hover:text-emerald-400">✏️</button>
                                <button onClick={() => handleOpenDelete(sde)} className="hover:text-red-400">🗑️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })
                    ) : (
                      <tr><td colSpan="7" className="py-12 text-center text-slate-500 font-semibold">{language === "bn" ? "কোন তথ্য পাওয়া যায়নি!" : "No SDE records match search filters."}</td></tr>
                    )}
                  </tbody>
                </table>
              </div>

              <div className="bg-slate-950 border-t border-slate-800 px-4 py-3 flex items-center justify-between flex-col sm:flex-row gap-4">
                <div className="text-xs text-slate-400">
                  {language === "bn" ? (
                    <>মোট <span className="text-slate-200 font-bold">{translateNumberToBn(filteredSdes.length)}</span> টি রেকর্ডের মধ্যে <span className="text-slate-200 font-bold">{translateNumberToBn(Math.min(filteredSdes.length, (currentPage - 1) * recordsPerPage + 1))}</span> থেকে <span className="text-slate-200 font-bold">{translateNumberToBn(Math.min(filteredSdes.length, currentPage * recordsPerPage))}</span> দেখানো হচ্ছে</>
                  ) : (
                    <>Showing <span className="text-slate-200 font-bold">{Math.min(filteredSdes.length, (currentPage - 1) * recordsPerPage + 1)}</span> to <span className="text-slate-200 font-bold">{Math.min(filteredSdes.length, currentPage * recordsPerPage)}</span> of <span className="text-slate-200 font-bold">{filteredSdes.length}</span> SDEs</>
                  )}
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-slate-400">{language === "bn" ? "প্রতি পৃষ্ঠায় রেকর্ড:" : "Rows per page:"}</span>
                  <select value={recordsPerPage} onChange={(e) => setRecordsPerPage(parseInt(e.target.value))} className="bg-slate-900 border border-slate-800 text-slate-200 py-1 px-2.5 rounded-lg text-xs">
                    <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option>
                  </select>
                </div>
                {totalPages > 1 && (
                  <div className="flex items-center gap-1">
                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(1)} className="px-2 py-1 bg-slate-900 border border-slate-800 rounded disabled:opacity-30 text-xs">⏮</button>
                    {Array.from({ length: totalPages }, (_, i) => i + 1).filter(p => Math.abs(p - currentPage) <= 2).map(pageNumber => (
                      <button key={pageNumber} onClick={() => setCurrentPage(pageNumber)} className={`px-2.5 py-1 rounded text-xs font-bold ${currentPage === pageNumber ? "bg-emerald-500 text-slate-950" : "bg-slate-900 text-slate-300 border border-slate-800"}`}>{language === "bn" ? translateNumberToBn(pageNumber) : pageNumber}</button>
                    ))}
                    <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(totalPages)} className="px-2 py-1 bg-slate-900 border border-slate-800 rounded disabled:opacity-30 text-xs">⏭</button>
                  </div>
                )}
              </div>
            </div>
          </main>

          {selectedSde && (
            <div className="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl relative">
                <div className="h-2.5 bg-gradient-to-r from-emerald-500 to-teal-400"></div>
                <div className="p-6 space-y-5">
                  <div className="flex justify-between items-start">
                    <div>
                      <span className="text-[10px] text-emerald-400 font-extrabold tracking-widest bg-emerald-950/40 px-2 py-0.5 rounded">SDE Seniority Registry Card</span>
                      <h3 className="text-xl font-black text-white mt-1.5">{language === "bn" ? selectedSde.nameBn : selectedSde.nameEn}</h3>
                      <p className="text-xs text-slate-400">ID Ref: {selectedSde.id} • Registry: #{selectedSde.serial}</p>
                    </div>
                    <button onClick={() => setSelectedSde(null)} className="text-slate-400 hover:text-white bg-slate-800 p-1 rounded-lg">✕</button>
                  </div>
                  <div className="grid grid-cols-2 gap-4 text-xs">
                    <div className="bg-slate-950/40 p-3 rounded-xl border border-slate-800"><span className="text-slate-500 block text-[9px] uppercase font-bold">Designation (EN)</span><span className="text-slate-200 font-semibold">{selectedSde.designationEn}</span></div>
                    <div className="bg-slate-950/40 p-3 rounded-xl border border-slate-800"><span className="text-slate-500 block text-[9px] uppercase font-bold">Designation (BN)</span><span className="text-slate-200 font-semibold">{selectedSde.designationBn}</span></div>
                    <div className="bg-slate-950/40 p-3 rounded-xl border border-slate-800"><span className="text-slate-500 block text-[9px] uppercase font-bold">Date of Birth</span><span className="text-slate-200 font-mono font-bold">{selectedSde.dob}</span></div>
                    <div className="bg-slate-950/40 p-3 rounded-xl border border-slate-800"><span className="text-slate-500 block text-[9px] uppercase font-bold">PRL Date</span><span className="text-amber-400 font-mono font-bold">{selectedSde.prl}</span></div>
                  </div>
                  <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-800">
                    <div className="flex justify-between text-xs"><span className="text-slate-400">Active Service Left:</span><span className="text-emerald-400 font-bold">{getRemainingService(selectedSde.prl)}</span></div>
                  </div>
                  <div className="flex justify-end"><button onClick={() => setSelectedSde(null)} className="px-4 py-2 bg-slate-800 rounded-xl text-xs font-bold">{language === "bn" ? "বন্ধ করুন" : "Dismiss"}</button></div>
                </div>
              </div>
            </div>
          )}

          {showAddEditModal && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg overflow-hidden">
                <div className="px-6 py-4 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                  <h3 className="font-bold text-sm uppercase tracking-wider text-slate-300">{modalMode === "add" ? "Add New Record" : "Edit Record"}</h3>
                  <button onClick={() => setShowAddEditModal(false)}>✕</button>
                </div>
                <form onSubmit={handleSaveRecord} className="p-6 space-y-4 text-xs">
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block mb-1 text-slate-400">Serial *</label><input type="number" required disabled={modalMode === "edit"} value={formData.serial} onChange={(e) => setFormData({ ...formData, serial: e.target.value })} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-2 rounded-xl" /></div>
                    <div><label className="block mb-1 text-slate-400">ID Code *</label><input type="text" required value={formData.id} onChange={(e) => setFormData({ ...formData, id: e.target.value })} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-2 rounded-xl" /></div>
                  </div>
                  <div><label className="block mb-1 text-slate-400">Name (Bengali) *</label><input type="text" required value={formData.nameBn} onChange={(e) => setFormData({ ...formData, nameBn: e.target.value })} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-2 rounded-xl" /></div>
                  <div><label className="block mb-1 text-slate-400">Name (English) *</label><input type="text" required value={formData.nameEn} onChange={(e) => setFormData({ ...formData, nameEn: e.target.value })} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-2 rounded-xl" /></div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block mb-1 text-slate-400">DOB (DD-MM-YYYY) *</label><input type="text" required value={formData.dob} onChange={(e) => setFormData({ ...formData, dob: e.target.value })} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-2 rounded-xl" /></div>
                    <div><label className="block mb-1 text-slate-400">PRL Date (DD-MM-YYYY) *</label><input type="text" required value={formData.prl} onChange={(e) => setFormData({ ...formData, prl: e.target.value })} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-2 rounded-xl" /></div>
                  </div>
                  <div className="flex justify-end gap-2 pt-4 border-t border-slate-800">
                    <button type="button" onClick={() => setShowAddEditModal(false)} className="px-4 py-2 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700">Cancel</button>
                    <button type="submit" className="px-4 py-2 bg-emerald-500 text-slate-950 font-bold rounded-xl">Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {showDeleteConfirm && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-850 rounded-2xl w-full max-w-sm p-5 space-y-4">
                <h4 className="text-md font-bold text-white">Confirm Delete</h4>
                <p className="text-xs text-slate-400">Are you sure you want to permanently delete this record?</p>
                <div className="flex gap-2 justify-end">
                  <button onClick={() => setShowDeleteConfirm(false)} className="px-3 py-1.5 bg-slate-800 rounded-lg text-xs">Cancel</button>
                  <button onClick={handleConfirmDelete} className="px-3 py-1.5 bg-red-600 text-white text-xs font-bold rounded-lg">Delete</button>
                </div>
              </div>
            </div>
          )}

          <footer className="bg-slate-950 border-t border-slate-900 py-6 mt-12 text-slate-500 text-xs">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="text-center sm:text-left"><p className="font-semibold text-slate-400">SDE Seniority Registry Management Tracker</p></div>
              <div className="text-center sm:text-right"><p className="text-slate-400 font-bold">Md. Minhajul Haque</p></div>
            </div>
          </footer>
        </div>
      );
    }

    // Mount execution line directly underneath component build matrix
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
